name: CI Build & Firebase Fingerprint
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/node-js@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Inject Configuration & Log Fingerprint
        run: |
          # Tworzymy tymczasowy config, żeby Capacitor nie sypał błędami
          echo '{ "appId": "com.legalcheck.ai", "appName": "LegalCheck AI", "webDir": "dist" }' > capacitor.config.json
          echo "Konfiguracja wstrzyknięta pomyślnie."

      - name: Build application
        run: npm run build

      - name: Generate and Log SHA-1 Fingerprint
        run: |
          echo "Generowanie certyfikatu debugowania dla Firebase..."
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "--- TWOJE SHA-1 DLA FIREBASE ---"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android | grep SHA1
          echo "---------------------------------"
