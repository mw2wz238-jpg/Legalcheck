name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Inject Configuration
        run: |
          echo '{ "appId": "com.legalcheck.ai", "appName": "LegalCheck AI", "webDir": "dist" }' > capacitor.config.json

      - name: Build application
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          npx cap add android || true
          npx cap sync android
          cd android && ./gradlew assembleDebug

      - name: Generate and Log SHA-1 Fingerprint
        run: |
          echo "--- TWOJE SHA-1 DLA FIREBASE ---"
          keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android | grep SHA1 || echo "Użyj SHA-1 z poprzedniego zielonego buildu"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: legalcheck-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
