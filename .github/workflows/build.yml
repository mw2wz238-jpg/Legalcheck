name: LegalCheck AI - Final APK & Auth Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: |
          # Budujemy wersję webową, którą Capacitor zamieni w APK
          CI=false npm run build || CI=false npx webpack --mode production

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Fingerprints for Firebase
        run: |
          # Generujemy klucze potrzebne do logowania Google
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android

      - name: Build Android APK
        run: |
          # Jeśli folder android nie istnieje, inicjalizujemy go
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Synchronizacja i kompilacja APK
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegalCheck-AI-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
