name: Build APK Online
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Critical Build Tools
        run: |
          # Instalujemy webpacka globalnie i lokalnie, aby system go widział wszędzie
          npm install -g webpack-cli webpack
          npm install -D webpack-cli webpack --legacy-peer-deps

      - name: Install App Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Project
        run: |
          # Wymuszamy brak pytań i ignorujemy błędy wersji
          CI=false npm run build -- --yes

      - name: Setup Java & Android
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Android & Build APK
        run: |
          # Instalacja Capacitora, jeśli go nie ma
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          
          # Sprawdzenie czy folder android istnieje, jeśli nie - tworzenie
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LegalCheck-AI-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
        run: |
          # Jeśli folder 'android' nie istnieje, dodajemy go
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Synchronizacja kodu webowego z projektem Androida
          npx cap sync android
          
          # Budowanie finalnego pliku APK za pomocą Gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegalCheck-AI-Debug-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
