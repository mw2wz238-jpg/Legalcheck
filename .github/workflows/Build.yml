name: Build APK Online
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Install Webpack & Dependencies
        run: |
          # Czyścimy pamięć podręczną i instalujemy wszystko z wymuszeniem 'yes'
          npm cache clean --force
          npm install -g webpack-cli webpack --yes
          npm install --legacy-peer-deps
          # Instalujemy webpack-cli lokalnie jako devDependency, żeby npm run build go widział
          npm install --save-dev webpack-cli --legacy-peer-deps

      - name: Build Web Project (No Interactive)
        run: |
          # Ustawiamy zmienną CI na false i dodajemy flagę --yes do skryptu
          export NODE_OPTIONS="--max-old-space-size=4096"
          CI=false npm run build -- --yes

      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          # Instalacja narzędzi Capacitora
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          
          # Tworzenie folderu android jeśli go nie ma
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LegalCheck-AI-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
