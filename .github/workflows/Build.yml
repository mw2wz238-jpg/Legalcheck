      - name: Build Android APK
        run: |
          # Instalacja niezbędnych dodatków
          npm install @capacitor/android --legacy-peer-deps
          
          # Inicjalizacja Capacitora, jeśli nie było pliku (na wszelki wypadek)
          npx cap init "LegalCheck AI" "com.legalcheck.ai" --web-dir dist
          
          # Dodanie platformy i budowa
          npx cap add android || true
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
