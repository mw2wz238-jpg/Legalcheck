name: Build APK Online
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: |
          CI=false npm run build || CI=false npx webpack --mode production

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Zmiana z 17 na 21 - to naprawi błąd ze screena
          distribution: 'temurin'

      - name: Initialize and Build Android
        run: |
          # Akceptacja licencji Android SDK
          yes | sdkmanager --licenses || true
          
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npm install @capacitor/android --legacy-peer-deps
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LegalCheck-AI-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
