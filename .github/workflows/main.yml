name: Android Debug Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build

    - name: Build Android APK
      run: |
        echo "CLEANING AND BUILDING DEBUG APK"
        
        if [ -d "android" ]; then
          npx cap sync android
          cd android
          # Clean first as requested, then build debug
          ./gradlew clean assembleDebug -Pkotlin.version=1.8.20
        else
          echo "Error: 'android' directory not found. Please ensure Capacitor is initialized."
          exit 1
        fi

    - name: Generate and Log SHA-1 Fingerprint
      run: |
        echo "------------------------------------------------------------"
        echo "EXTRACTING DEBUG FINGERPRINT FOR FIREBASE"
        echo "------------------------------------------------------------"
        
        if [ -f "android/app/debug.keystore" ]; then
           keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android | grep "SHA1:"
        else
           echo "Debug keystore not found in default android location."
        fi
        echo "------------------------------------------------------------"

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: legalcheck-app.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
