name: Android Debug Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build

    - name: Build Android APK
      run: |
        echo "INITIALIZING AND BUILDING ANDROID APK"
        
        # Add android platform if missing
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        
        # Copy web assets to android
        npx cap copy
        
        cd android
        # Clean as requested and assemble debug with Kotlin enforcement
        ./gradlew clean assembleDebug -Pkotlin.version=1.8.20

    - name: Generate and Log SHA-1 Fingerprint
      run: |
        echo "------------------------------------------------------------"
        echo "EXTRACTING DEBUG FINGERPRINT FOR FIREBASE"
        echo "------------------------------------------------------------"
        
        # Checking possible locations for debug.keystore
        KEYSTORE_PATH="android/app/debug.keystore"
        if [ ! -f "$KEYSTORE_PATH" ]; then
           # Search for it in the android directory if not in standard path
           KEYSTORE_PATH=$(find android -name "debug.keystore" | head -n 1)
        fi

        if [ -n "$KEYSTORE_PATH" ] && [ -f "$KEYSTORE_PATH" ]; then
           keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android | grep "SHA1:"
        else
           echo "Debug keystore not found. It might be generated during the first run if missing."
        fi
        echo "------------------------------------------------------------"

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: legalcheck-app.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
