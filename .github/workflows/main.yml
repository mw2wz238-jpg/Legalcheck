name: Android Debug Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm install @capacitor/cli @capacitor/core @capacitor/android

    - name: Build Web Application
      run: npm run build

    - name: Build Android APK
      run: |
        echo "INITIALIZING AND BUILDING ANDROID APK"
        echo '{"appId": "com.legalcheck.ai", "appName": "LegalCheck AI", "webDir": "dist"}' > capacitor.config.json
        mkdir -p dist && touch dist/index.html
        
        npx cap add android || true
        
        # Forced fix for Duplicate class errors by forcing Kotlin stdlib versions
        printf "android {\n    configurations.all {\n        resolutionStrategy {\n            force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.20'\n            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.20'\n            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.20'\n        }\n    }\n}" >> android/app/build.gradle
        
        npx cap sync
        chmod +x android/gradlew
        cd android && ./gradlew clean assembleDebug -Pkotlin.version=1.8.20

    - name: Generate and Log SHA-1 Fingerprint
      run: |
        echo "------------------------------------------------------------"
        echo "EXTRACTING KEY FINGERPRINTS FOR FIREBASE"
        echo "------------------------------------------------------------"
        cd android && ./gradlew signingReport
        echo "------------------------------------------------------------"

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: legalcheck-app.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
